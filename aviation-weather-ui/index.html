<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航空气象智能分发系统</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #0a1628;
            --accent-cyan: #00d4ff;
            --accent-cyan-dim: #0099bb;
            --warning-amber: #ffa500;
            --danger-red: #ff4757;
            --success-green: #26de81;
            --text-primary: #e8f0ff;
            --text-secondary: #8b9dc3;
            --border-color: #2a3f5f;
            --card-bg: rgba(26, 39, 68, 0.7);
            --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Source Sans 3', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #0d1f3c 50%, #0a1628 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }
        header { text-align: center; margin-bottom: 3rem; padding: 2rem 0; position: relative; }
        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 60%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
        }
        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }
        h1 span { color: var(--accent-cyan); }
        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 2rem;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-cyan-dim));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.5s ease;
        }
        .card:hover::before { transform: scaleX(1); }
        .card:hover { border-color: var(--accent-cyan-dim); box-shadow: var(--glow-cyan); }
        .card-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }
        .card-title::before { content: '▸ '; font-size: 0.7rem; }
        .input-section { grid-column: 1 / 2; grid-row: 1 / 3; }
        .textarea-wrapper { margin-bottom: 1.5rem; }
        textarea {
            width: 100%;
            min-height: 120px;
            background: var(--primary-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-primary);
            resize: vertical;
            transition: all 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.1);
        }
        textarea::placeholder { color: var(--text-secondary); opacity: 0.6; }
        .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .role-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .role-option { position: relative; }
        .role-option input { position: absolute; opacity: 0; cursor: pointer; }
        .role-label {
            display: block;
            padding: 1rem;
            background: var(--primary-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .role-label:hover {
            border-color: var(--accent-cyan-dim);
            background: rgba(0, 212, 255, 0.05);
        }
        .role-option input:checked + .role-label {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.2);
        }
        .role-icon { font-size: 1.5rem; display: block; margin-bottom: 0.5rem; }
        .role-name { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 600; }
        .btn {
            width: 100%;
            padding: 1rem 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-cyan-dim) 100%);
            color: var(--primary-dark);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        .parse-result { margin-top: 1.5rem; }
        .data-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .data-item {
            background: var(--primary-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        .data-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 0.25rem;
        }
        .data-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .risk-section { grid-column: 2 / 3; grid-row: 1 / 2; }
        .risk-display { text-align: center; padding: 2rem 1rem; }
        .risk-level {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        .risk-level.low { color: var(--success-green); }
        .risk-level.medium { color: var(--warning-amber); }
        .risk-level.high { color: var(--danger-red); }
        .risk-level.critical {
            color: var(--danger-red);
            animation: pulse-danger 1s ease-in-out infinite;
        }
        @keyframes pulse-danger {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .risk-summary {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            line-height: 1.6;
        }
        .warning-badge {
            display: inline-block;
            background: rgba(255, 165, 0, 0.2);
            border: 1px solid var(--warning-amber);
            border-radius: 4px;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--warning-amber);
            margin: 0.25rem;
        }
        .explanation-section { grid-column: 2 / 3; grid-row: 2 / 3; }
        .explanation-output {
            background: var(--primary-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 300px;
            line-height: 1.8;
            color: var(--text-primary);
        }
        .explanation-output h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            color: var(--accent-cyan);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .highlight { color: var(--warning-amber); font-weight: 600; }
        .loading {
            display: none;
            text-align: center;
            padding: 3rem;
        }
        .loading.active { display: block; }
        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 1rem;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
        }
        .system-info {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0, 212, 255, 0.05);
            border-left: 3px solid var(--accent-cyan);
            border-radius: 0 8px 8px 0;
        }
        .system-info-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-cyan);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .metrics { display: flex; gap: 2rem; flex-wrap: wrap; }
        .metric { flex: 1; min-width: 150px; }
        .metric-label { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .deerflow-badge {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            transition: all 0.3s;
            z-index: 100;
        }
        .deerflow-badge:hover {
            color: var(--accent-cyan);
            border-color: var(--accent-cyan-dim);
            transform: translateY(-2px);
        }
        ul { list-style: none; padding-left: 0; }
        li { margin
