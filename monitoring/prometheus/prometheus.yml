global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: aviation-weather-monitoring

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: aviation-weather-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: aviation-weather-agent
          env: local

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector

  - job_name: phoenix
    metrics_path: /metrics
    static_configs:
      - targets: ["phoenix:9090"]
        labels:
          service: phoenix
