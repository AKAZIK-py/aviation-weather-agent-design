# Ruff config — aviation-weather-agent
target-version = "py312"
line-length = 120
src = ["app", "tests"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
ignore = [
    "E501",  # line too long — formatter handles this
    "B008",  # function call in default argument (FastAPI Depends pattern)
]

[lint.per-file-ignores]
"tests/**" = ["S101"]  # allow assert in tests
"app/api/main.py" = ["B008"]

[format]
quote-style = "double"
indent-style = "space"
